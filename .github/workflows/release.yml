name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          echo "CXXFLAGS=-D_LIBCPP_DISABLE_AVAILABILITY" >> $GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-D_LIBCPP_DISABLE_AVAILABILITY" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Cache Homebrew
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/cmake
          key: brew-cmake-${{ runner.os }}

      - name: Install cmake (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v cmake &>/dev/null; then
            brew install cmake
          else
            echo "cmake $(cmake --version | head -1) already available"
          fi

      - name: Build sidecar binaries (macOS)
        if: runner.os == 'macOS'
        working-directory: src-tauri
        run: |
          cargo build --release --bin matcher --target ${{ matrix.target }}
          cargo build --release --bin AppScannerMac --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/matcher bin/AppMatcher-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/AppScannerMac bin/AppScanner-${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CoolDesk ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See the full changelog for details.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          updaterJsonKeepUniversal: true
          updaterJsonPreferNsis: true
