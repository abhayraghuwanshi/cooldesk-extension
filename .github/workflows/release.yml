name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      test_only:
        description: 'Test build only (no release published)'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'CoolDesk ${{ github.ref_name }}'
          body: |
            ## What's new
            See the full changelog for details.
          draft: true
          prerelease: false

  build:
    needs: [create-release]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_args: --bundles nsis,msi
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_args: --bundles dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Build sidecar binaries (macOS)
        if: runner.os == 'macOS'
        working-directory: src-tauri
        run: |
          cargo build --release --bin matcher --target ${{ matrix.target }}
          cargo build --release --bin AppScannerMac --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/matcher bin/AppMatcher-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/AppScannerMac bin/AppScanner-${{ matrix.target }}
          chmod +x bin/AppMatcher-${{ matrix.target }} bin/AppScanner-${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install

      # On manual dispatch: build only (no release)
      - name: Build (test only)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: Sign artifacts (Windows, test only)
        if: github.event_name == 'workflow_dispatch' && runner.os == 'Windows'
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_PFX_BASE64) {
            Write-Host "WINDOWS_CERT_PFX_BASE64 not set — skipping signing"
            exit 0
          }
          $certPath = "$env:TEMP\cooldesk.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_PFX_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } | Select-Object -First 1 -ExpandProperty FullName

          Get-ChildItem "src-tauri\target\${{ matrix.target }}\release\bundle" -Recurse -Include "*.msi","*.exe" |
            ForEach-Object {
              Write-Host "Signing $($_.FullName)"
              & $signtool sign /f $certPath /p $env:CERT_PASSWORD `
                /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
            }
          Remove-Item $certPath

      - name: Test installation (macOS)
        if: github.event_name == 'workflow_dispatch' && runner.os == 'macOS'
        run: |
          set -e

          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          echo "==> Found DMG: $DMG"
          [ -f "$DMG" ] || (echo "ERROR: DMG not found" && exit 1)

          hdiutil attach "$DMG" -mountpoint /Volumes/CoolDeskTest -nobrowse -quiet
          echo "==> DMG mounted"

          APP=$(find /Volumes/CoolDeskTest -name "*.app" -maxdepth 1 | head -1)
          cp -r "$APP" /tmp/CoolDesk-test.app
          hdiutil detach /Volumes/CoolDeskTest -quiet

          xattr -cr /tmp/CoolDesk-test.app

          MAIN_BIN=$(find /tmp/CoolDesk-test.app/Contents/MacOS -maxdepth 1 -type f | head -1)
          [ -x "$MAIN_BIN" ] || (echo "ERROR: main binary not executable" && exit 1)
          file "$MAIN_BIN" | grep -q "Mach-O" || (echo "ERROR: not a valid Mach-O binary" && exit 1)
          echo "==> Main binary OK"

          SCANNER=/tmp/CoolDesk-test.app/Contents/MacOS/AppScanner
          [ -x "$SCANNER" ] || (echo "ERROR: AppScanner not executable" && exit 1)
          "$SCANNER" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          installed = len(d.get('installed', []))
          assert installed > 0, 'Expected at least some installed apps'
          print(f'AppScanner OK: {installed} installed apps')
          "

          MATCHER=/tmp/CoolDesk-test.app/Contents/MacOS/AppMatcher
          [ -x "$MATCHER" ] || (echo "ERROR: AppMatcher not executable" && exit 1)
          file "$MATCHER" | grep -q "Mach-O" || (echo "ERROR: AppMatcher not a valid Mach-O binary" && exit 1)
          echo "==> AppMatcher OK"

          open /tmp/CoolDesk-test.app
          for i in $(seq 1 10); do
            if pgrep -f "CoolDesk-test" > /dev/null || pgrep -f "cooldesk" > /dev/null; then
              echo "==> App process running — launch OK"
              break
            fi
            sleep 0.5
            [ $i -eq 10 ] && echo "WARNING: app process not detected (headless CI limitation)"
          done

          pkill -f "CoolDesk-test" 2>/dev/null || true
          rm -rf /tmp/CoolDesk-test.app
          echo "==> Installation test complete"

      - name: Upload artifact (test only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cooldesk-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          retention-days: 3

      # On tag push: build and attach unsigned artifacts to release first
      - name: Build and upload to release
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseName: 'CoolDesk ${{ github.ref_name }}'
          args: --target ${{ matrix.target }} ${{ matrix.bundle_args }}
          updaterJsonKeepUniversal: true
          updaterJsonPreferNsis: true

      # Sign the built artifacts and re-upload to replace unsigned ones
      - name: Sign artifacts (Windows)
        if: github.event_name == 'push' && runner.os == 'Windows'
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_PFX_BASE64) {
            Write-Host "WINDOWS_CERT_PFX_BASE64 not set — skipping signing"
            exit 0
          }
          $certPath = "$env:TEMP\cooldesk.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_PFX_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } | Select-Object -First 1 -ExpandProperty FullName

          Get-ChildItem "src-tauri\target\${{ matrix.target }}\release\bundle" -Recurse -Include "*.msi","*.exe" |
            ForEach-Object {
              Write-Host "Signing $($_.FullName)"
              & $signtool sign /f $certPath /p $env:CERT_PASSWORD `
                /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
            }
          Remove-Item $certPath

      - name: Re-upload signed artifacts to release (Windows)
        if: github.event_name == 'push' && runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (-not "${{ secrets.WINDOWS_CERT_PFX_BASE64 }}") {
            Write-Host "No cert — skipping re-upload"
            exit 0
          }
          $tag = "${{ github.ref_name }}"
          Get-ChildItem "src-tauri\target\${{ matrix.target }}\release\bundle" -Recurse -Include "*.msi","*.exe" |
            ForEach-Object {
              Write-Host "Re-uploading signed: $($_.Name)"
              gh release upload $tag $_.FullName --clobber --repo ${{ github.repository }}
            }

  publish:
    needs: [create-release, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name'

      - name: Generate latest.json for auto-updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Always regenerate — tauri-action may have produced a partial file
          # (only one platform) due to parallel job race condition
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets')
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          NSIS_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("-setup.exe")) | .browserDownloadUrl' | head -1)
          NSIS_SIG_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith("-setup.exe.sig")) | .browserDownloadUrl' | head -1)
          DMG_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".dmg")) | .browserDownloadUrl' | head -1)
          DMG_SIG_URL=$(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".dmg.sig")) | .browserDownloadUrl' | head -1)

          NSIS_SIG=""
          DMG_SIG=""
          [ -n "$NSIS_SIG_URL" ] && NSIS_SIG=$(curl -sL "$NSIS_SIG_URL")
          [ -n "$DMG_SIG_URL"  ] && DMG_SIG=$(curl -sL "$DMG_SIG_URL")

          if [ -z "$NSIS_SIG" ] && [ -z "$DMG_SIG" ]; then
            echo "WARNING: No .sig files found — TAURI_SIGNING_PRIVATE_KEY may not be set. Skipping latest.json."
            exit 0
          fi

          PLATFORMS="{}"
          if [ -n "$NSIS_SIG" ] && [ -n "$NSIS_URL" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$NSIS_SIG" --arg url "$NSIS_URL" \
              '."windows-x86_64" = {signature: $sig, url: $url}')
          fi
          if [ -n "$DMG_SIG" ] && [ -n "$DMG_URL" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$DMG_SIG" --arg url "$DMG_URL" \
              '."darwin-aarch64" = {signature: $sig, url: $url}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: "See the changelog for details.", pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo "==> Generated latest.json:"
          cat latest.json
          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
          echo "==> latest.json uploaded"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false

      - name: Upload installer to Cloudflare R2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
        run: |
          # Download the signed MSI from the release
          MSI_URL=$(gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '.assets[] | select(.name | endswith("_en-US.msi")) | .browserDownloadUrl' | head -1)

          if [ -z "$MSI_URL" ]; then
            echo "No MSI found in release — skipping R2 upload"
            exit 0
          fi

          curl -L "$MSI_URL" -o CoolDesk-setup.msi
          echo "Downloaded: $(du -h CoolDesk-setup.msi | cut -f1)"

          # Upload to R2 using S3-compatible API (R2 is S3-compatible)
          aws s3 cp CoolDesk-setup.msi \
            s3://cooldesk-downloads/CoolDesk-setup.msi \
            --endpoint-url "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region auto \
            --no-progress

          echo "Uploaded to R2 — available at:"
          echo "https://pub-c48321b20c8942d1ad52781d27b6b607.r2.dev/CoolDesk-setup.msi"
