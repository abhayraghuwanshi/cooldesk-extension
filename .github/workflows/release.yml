name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Per-target Rust + llama.cpp CMake cache
      # shared-key ties the cache to the target triple so each matrix leg gets its own cache
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      # Cache Homebrew packages so brew install cmake doesn't re-download every run
      - name: Cache Homebrew
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/cmake
            /opt/homebrew/Cellar/cmake
          key: brew-cmake-${{ runner.os }}

      - name: Install cmake (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v cmake &>/dev/null; then
            brew install cmake
          else
            echo "cmake already available: $(cmake --version | head -1)"
          fi

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CoolDesk ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See the full changelog for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          updaterJsonKeepUniversal: true
