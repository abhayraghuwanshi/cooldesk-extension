name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'CoolDesk ${{ github.ref_name }}'
          body: |
            ## What's new
            See the full changelog for details.
          draft: true
          prerelease: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          echo "CXXFLAGS=-D_LIBCPP_DISABLE_AVAILABILITY" >> $GITHUB_ENV
          echo "CMAKE_CXX_FLAGS=-D_LIBCPP_DISABLE_AVAILABILITY" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Cache Homebrew
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/cmake
          key: brew-cmake-${{ runner.os }}

      - name: Install cmake (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v cmake &>/dev/null; then
            brew install cmake
          else
            echo "cmake $(cmake --version | head -1) already available"
          fi

      - name: Build sidecar binaries (macOS)
        if: runner.os == 'macOS'
        working-directory: src-tauri
        run: |
          cargo build --release --bin matcher --target ${{ matrix.target }}
          cargo build --release --bin AppScannerMac --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/matcher bin/AppMatcher-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/AppScannerMac bin/AppScanner-${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseName: 'CoolDesk ${{ github.ref_name }}'
          args: --target ${{ matrix.target }}
          updaterJsonKeepUniversal: true
          updaterJsonPreferNsis: true

  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Download .sig files from the release
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir /tmp/sigs

          WIN_SIG=$(cat "/tmp/sigs/cooldesk_${VERSION}_x64-setup.nsis.zip.sig" 2>/dev/null || echo "")
          MAC_SIG=$(cat "/tmp/sigs/cooldesk_aarch64.app.tar.gz.sig" 2>/dev/null || echo "")

          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          cat > /tmp/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes.",
            "pub_date": "${DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE}/cooldesk_${VERSION}_x64-setup.nsis.zip"
              },
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${BASE}/cooldesk_aarch64.app.tar.gz"
              }
            }
          }
          EOF

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
