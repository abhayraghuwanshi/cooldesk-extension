<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Orb Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- Base Styles --- */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            /* Deep slate blue from the original design */
            color: #e2e8f0;
            /* Light slate text */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- Animation 8: Celestial Orb --- */
        .celestial-orb-container {
            transform-style: preserve-3d;
            perspective: 800px;
            /* Replaced full spin with a gentle wobble to avoid 2D look */
            animation: container-wobble 20s infinite ease-in-out alternate;
        }

        @keyframes container-wobble {
            from {
                transform: rotateY(-20deg) rotateX(10deg);
            }

            to {
                transform: rotateY(20deg) rotateX(-10deg);
            }
        }

        .celestial-orb {
            background: radial-gradient(circle at 30% 30%, #ec4899, #7c3aed, #2563eb);
            box-shadow:
                inset 0 0 20px rgba(255, 255, 255, 0.2),
                0 0 50px 10px rgba(124, 58, 237, 0.4);
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
        }

        .celestial-orb::before {
            /* Specular Highlight (Static relative to the orb's wobble) */
            content: '';
            position: absolute;
            top: 5%;
            left: 10%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 60%);
            border-radius: 50%;
        }

        .celestial-orb::after {
            /* Shading (Static relative to the orb's wobble) */
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            box-shadow: inset -20px -10px 40px rgba(0, 0, 0, 0.5);
        }

        .celestial-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        /* New container for the particle's rotation */
        .particle-orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: particle-spin 10s infinite linear;
            transform-style: preserve-3d;
        }

        @keyframes particle-spin {
            from {
                transform: rotateZ(0deg);
            }

            to {
                transform: rotateZ(360deg);
            }
        }

        .particle-orbit::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px #fff;
            transform: translateX(-50%);
        }
    </style>
</head>

<body>
    <!-- Card for Celestial Orb -->
    <div class="p-6 flex flex-col items-center justify-center">
        <h2 class="text-2xl font-medium mb-12 text-slate-300">Celestial Orb</h2>
        <div class="relative h-48 w-48 flex items-center justify-center">
            <div class="celestial-orb-container absolute w-full h-full">
                <!-- Rings -->
                <div class="celestial-ring"
                    style="width: 140%; height: 140%; margin-left: -70%; margin-top: -70%; transform: rotateX(70deg);">
                </div>
                <div class="celestial-ring"
                    style="width: 120%; height: 120%; margin-left: -60%; margin-top: -60%; transform: rotateX(70deg) rotateY(60deg);">
                </div>
                <!-- Ring with Particle Trail -->
                <div class="celestial-ring"
                    style="width: 160%; height: 160%; margin-left: -80%; margin-top: -80%; transform: rotateX(70deg) rotateY(120deg);">
                    <div class="particle-orbit"></div>
                </div>
                <!-- Central Orb -->
                <div
                    class="celestial-orb absolute w-2/3 h-2/3 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
