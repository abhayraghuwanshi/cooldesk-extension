<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoolDesk</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0f0b14;
            color: #e5e7eb;
        }

        .wrap {
            padding: 12px;
            width: 320px;
        }

        .btn {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.06);
            color: inherit;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .status {
            margin-top: 12px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <button id="login" class="btn">Login with Google</button>
        <div id="status" class="status"></div>
    </div>
    <script type="module" src="src/popup.js"></script>
</body>

</html>
