<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLink Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.skypack.dev/pin/psl@v1.15.0-w09qfLM9YTYCu6IhPzCs/mode=imports,      /optimized/psl.js"
        rel="modulepreload">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            background-color: #121212;
            color: #e0e0e0;
            font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .filter-info {
            color: #aaa;
            font-size: 0.85em;
            margin: -10px 0 12px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-pill {
            background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
            border: 1px solid #333;
            color: #ccc;
            padding: 4px 10px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 2em;
            font-weight: 700;
            color: #eee;
            margin: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(135deg, #bb86fc, #03dac6, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            animation: gradientShift 3s ease-in-out infinite;
            letter-spacing: -0.02em;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .sync-btn {
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            color: #121212;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.3);
            letter-spacing: 0.01em;
        }

        .sync-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(187, 134, 252, 0.4);
            background: linear-gradient(135deg, #03dac6, #bb86fc);
        }

        .sync-btn:active {
            transform: translateY(0);
        }

        .sync-btn.loading {
            background: linear-gradient(135deg, #666, #888);
            cursor: not-allowed;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .settings-btn {
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: #121212;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.3);
        }

        .settings-btn:hover {
            transform: translateY(-2px) rotate(90deg);
            box-shadow: 0 6px 20px rgba(187, 134, 252, 0.4);
        }

        .settings-btn:active {
            transform: translateY(0) rotate(90deg);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            position: relative;
            border: 1px solid rgba(187, 134, 252, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.5em;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.01em;
        }

        .modal-close {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: #121212;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            transform: scale(1.1);
        }

        .modal-content {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e0e0e0;
            font-size: 0.95em;
            letter-spacing: 0.01em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            border: 1px solid #333;
            border-radius: 6px;
            background: linear-gradient(135deg, #2c2c2c, #1e1e1e);
            color: #e0e0e0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        .form-group input:focus {
            outline: none;
            border-color: #bb86fc;
            box-shadow: 0 0 0 2px rgba(187, 134, 252, 0.2);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.01em;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #03dac6, #00bcd4);
            color: #121212;
        }

        .modal-btn.primary:hover {
            background: linear-gradient(135deg, #00bcd4, #03dac6);
            transform: translateY(-1px);
        }

        .modal-btn.secondary {
            background: linear-gradient(135deg, #666, #888);
            color: #e0e0e0;
        }

        .modal-btn.secondary:hover {
            background: linear-gradient(135deg, #888, #666);
            transform: translateY(-1px);
        }

        .api-status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .api-status.valid {
            background: linear-gradient(135deg, rgba(3, 218, 198, 0.2), rgba(0, 188, 212, 0.2));
            border: 1px solid rgba(3, 218, 198, 0.3);
            color: #03dac6;
        }

        .api-status.invalid {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 142, 142, 0.2));
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .api-status.missing {
            background: linear-gradient(135deg, rgba(240, 173, 78, 0.2), rgba(255, 152, 0, 0.2));
            border: 1px solid rgba(240, 173, 78, 0.3);
            color: #f0ad4e;
        }



        #search-input {
            width: 250px;
            /* Adjust as needed */
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #eee;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        #search-input:focus {
            outline: none;
            width: 300px;
            /* Expand on focus */
            border-color: #bb86fc;
            box-shadow: 0 0 15px rgba(187, 134, 252, 0.2);
        }

        .category-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .category-chips .filter-btn {
            background-color: #333;
            color: #eee;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-size: 0.9em;
        }

        .category-chips .filter-btn:hover {
            background-color: #444;
            border-color: #777;
        }

        .category-chips .filter-btn.active {
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            color: #121212;
            border-color: transparent;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.2);
        }

        /* Item List */
        .item-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 100%;
        }

        .item {
            background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
            padding: 15px;
            border-radius: 8px;
            display: grid;
            grid-template-rows: auto 1fr auto auto;
            gap: 8px;
            min-height: 120px;
            border-left: 4px solid #bb86fc;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #bb86fc, #03dac6);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .item:hover::before {
            opacity: 1;
        }

        .item-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #eee;
            margin: 0;
        }

        .item-summary {
            font-size: 1em;
            color: #b0b0b0;
            margin: 0;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            color: #888;
            margin-top: auto;
        }

        .item-category {
            background: linear-gradient(135deg, #333, #444);
            color: #03dac6;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.8em;
            letter-spacing: 0.01em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .item-workspace {
            font-style: italic;
            color: #888;
            font-size: 0.9em;
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.8em;
            font-weight: 400;
        }

        .item-type {
            font-style: italic;
            font-weight: 500;
        }

        .item-url {
            color: #888;
            font-size: 0.8em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .item-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .tag {
            background: #333;
            color: #ccc;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .favicon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #333, #444);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #888;
        }

        .favicon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .favicon.fallback {
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            color: #121212;
            font-weight: 700;
        }

        .loading,
        .empty {
            text-align: center;
            color: #888;
            font-size: 1.2em;
            padding: 50px;
            font-weight: 400;
        }

        .category-header {
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            color: #121212;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.3);
        }

        .category-header h2 {
            margin: 0 0 8px 0;
            font-size: 1.8em;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .category-header p {
            margin: 0;
            font-size: 1em;
            opacity: 0.8;
            font-weight: 500;
        }

        .empty h3 {
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .empty p {
            margin: 0;
            color: #888;
            font-size: 0.9em;
            font-weight: 400;
        }

        /* Stats Sections */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .stats-section {
            background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #03dac6;
            position: relative;
            overflow: hidden;
        }

        .stats-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #03dac6, #bb86fc);
        }

        .stats-section h3 {
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, #03dac6, #bb86fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .stats-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            transition: all 0.2s ease;
        }

        .stats-item:last-child {
            border-bottom: none;
        }

        .stats-item:hover {
            background: linear-gradient(135deg, rgba(187, 134, 252, 0.1), rgba(3, 218, 198, 0.1));
            border-radius: 4px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .stats-item a {
            color: #e0e0e0;
            text-decoration: none;
            flex: 1;
            margin-right: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s ease;
            font-weight: 500;
        }

        .stats-item a:hover {
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-favicon {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #333, #444);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #888;
        }

        .stats-favicon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .stats-favicon.fallback {
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            color: #121212;
            font-weight: 700;
        }

        .stats-count {
            background: linear-gradient(135deg, #333, #444);
            color: #03dac6;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .stats-date {
            color: #888;
            font-size: 0.8em;
            min-width: 80px;
            text-align: right;
            font-weight: 400;
        }

        @media (max-width: 1200px) {
            .item-list {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .stats-container {
                grid-template-columns: 1fr;
            }

            #category-filters {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }

            .item-list {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <h1 class="logo">DevLink</h1>
                <div class="header-actions">
                    <input type="search" id="search-input" placeholder="Search...">
                    <button id="sync-btn" class="sync-btn">Sync</button>
                    <button id="settings-btn" class="settings-btn">⚙️</button>
                </div>
            </div>
            <div id="filter-info" class="filter-info"></div>
            <div id="category-filters" class="filters"></div>
            <div id="workspace-filters" class="filters" style="margin-top:8px;"></div>
        </header>

        <div class="stats-container">
            <div class="stats-section">
                <h3>Most Visited</h3>
                <ul id="frequent-list" class="stats-list">
                    <li class="loading">Loading...</li>
                </ul>
            </div>
            <div class="stats-section">
                <h3>Recently Accessed</h3>
                <ul id="recent-list" class="stats-list">
                    <li class="loading">Loading...</li>
                </ul>
            </div>
        </div>

        <ul id="item-list" class="item-list">
            <li class="loading">Syncing data...</li>
        </ul>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">API Key Settings</h2>
                <button class="modal-close" id="modal-close-btn">×</button>
            </div>
            <div class="modal-content">
                <div class="form-group">
                    <label for="api-key-input-modal">Gemini API Key:</label>
                    <input type="password" id="api-key-input-modal" placeholder="Enter your API key...">
                </div>
                <div class="form-group">
                    <label for="api-server-input-modal">API Server URL</label>
                    <input id="api-server-input-modal" type="text" placeholder="https://your-server.example.com" />
                </div>
                <div class="form-group">
                    <label for="visit-threshold-input">Visit Count Threshold</label>
                    <input id="visit-threshold-input" type="number" min="0" step="1" placeholder="10" />
                </div>
                <div class="form-group">
                    <label for="history-limit-input">History Fetch Limit</label>
                    <input id="history-limit-input" type="number" min="10" step="10" placeholder="1000" />
                </div>
                <div class="api-status" id="api-status">
                    <span>API Key Status: Missing</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" id="modal-cancel-btn">Cancel</button>
                <button class="modal-btn primary" id="modal-save-btn">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
